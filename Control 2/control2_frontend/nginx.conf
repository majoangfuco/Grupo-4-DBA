server {
    listen       80;
    server_name  localhost;

    # Sirve el frontend de Vue (archivos estáticos compilados)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Crucial para Vue Router en modo history: redirige rutas SPA a index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso hacia el backend de Spring Boot
    # Todas las peticiones a /api/ se reenvían al contenedor 'backend' en el puerto 8080
    # Esto evita problemas de CORS y puertos, ya que todo sale desde el mismo origen (puerto 80)
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
