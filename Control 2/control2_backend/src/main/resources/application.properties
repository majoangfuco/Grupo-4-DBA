spring.application.name=control2_backend

# ================= BASE DE DATOS (POSTGRESQL) =================
# Usa variables de entorno: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:control2_bd}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&stringtype=unspecified&ApplicationName=Control2
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.sql.init.encoding=UTF-8

# ================= SERVIDOR =================
server.port=${SERVER_PORT:8081}
server.servlet.encoding.charset=${SERVER_SERVLET_ENCODING:UTF-8}
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ================= JPA / HIBERNATE & POSTGIS =================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}

# ================= SQL INITIALIZATION =================
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=${SQL_INIT_CONTINUE_ON_ERROR:true}
spring.sql.init.encoding=UTF-8

# ================= LOGGING =================
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
logging.level.root=${LOG_LEVEL:INFO}

# ================= JWT (CONFIGURACIÓN DE SEGURIDAD) =================
jwt.secret=${JWT_SECRET:EstaEsUnaClaveSecretaMuyLargaYSeguraParaElControl2DeArquitectura2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ================= EMAIL (NOTIFICACIONES) =================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@sistematareas.com}
app.mail.enabled=${MAIL_ENABLED:false}

# ================= CORS =================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}