spring.application.name=control2_backend

# ================= BASE DE DATOS (POSTGRESQL) =================
# Cambia "control2_db", "postgres" y "tu_contraseña" por tus credenciales reales
spring.datasource.url=jdbc:postgresql://localhost:5432/control2_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&stringtype=unspecified&ApplicationName=Control2
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.encoding=UTF-8

# ================= ENCODING HTTP =================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ================= JPA / HIBERNATE & POSTGIS =================
# Hibernate 6 integra spatial de forma nativa; no necesita dialecto especial
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ================= SQL INITIALIZATION =================
# Ejecutar data.sql automáticamente al iniciar Spring
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8

# Mostrar las consultas SQL en la consola (súper útil para depurar tus funciones espaciales ST_Distance, etc.)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ================= JWT (CONFIGURACIÓN DE SEGURIDAD) =================
# Clave para firmar tus tokens. El tiempo de expiración está en milisegundos (ej: 86400000 = 1 día)
jwt.secret=EstaEsUnaClaveSecretaMuyLargaYSeguraParaElControl2DeArquitectura2026
jwt.expiration=86400000