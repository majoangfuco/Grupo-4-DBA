spring.application.name=backend
server.port=${APP_PORT:8090}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:b2b}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Permite recibir cuerpos JSON parciales (p. ej. crear una categoría enviando
# solo el nombre) sin fallar cuando un campo primitivo llega ausente/nulo.
spring.jackson.deserialization.fail-on-null-for-primitives=false